name: Bug report
description: Report a bug in scripts, routing, search, catalog generation, or docs.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scripts
        - routing
        - search
        - catalog generation
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands only if they do not expose secrets.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and relevant tool versions.
